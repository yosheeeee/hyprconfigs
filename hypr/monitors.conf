# This file is to be overwritten by nwg-displays if you choose to use it.
# nwg-displays is a graphical tool for managing monitors. 
# - Installation for Arch Linux: sudo pacman -S nwg-displays
# - Repo: https://github.com/nwg-piotr/nwg-displays
# 1. Левый монитор (точка отсчета)
monitor = HDMI-A-1, 1920x1080@180, 0x0, 1
# 2. Центральный монитор (начинается там, где заканчивается левый: по X это 1920. По Y смещен на 80 вниз)
monitor = DP-1, 2560x1440@165, 1920x80, 1
# 3. Правый монитор (начинается там, где заканчивается центральный: 1920 + 2560 = 4480)
monitor = HDMI-A-2, 1920x1080@120, 4480x80, 1
workspace = 1, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 5, monitor:DP-1
# Назначения для второго монитора (замените DP-2 на имя вашего монитора)
workspace = 2, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 6,monitor:HDMI-A-1
